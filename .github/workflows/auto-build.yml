name: Auto Build and Release (Android Development)

on:
  push:
    branches:
      - main
      - dev
      - android
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Android NDK/SDK versions
  NDK_VERSION: "26.1.10909125"
  ANDROID_API_LEVEL: "29"
  ANDROID_BUILD_TOOLS: "34.0.0"

jobs:
  get-version:
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[no build]') &&
      !contains(github.event.head_commit.message, '[skip build]')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_number: ${{ steps.get_version.outputs.version_number }}
      release_notes: ${{ steps.generate_notes.outputs.release_notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release version
        id: get_version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          echo "Latest tag: $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          VERSION=$(echo "$LATEST_TAG" | sed 's/^v//' | sed 's/-.*$//')
          echo "Parsed version: $VERSION"

          MAJOR=$(echo "$VERSION" | cut -d. -f1 | grep -E '^[0-9]+$' || echo "0")
          MINOR=$(echo "$VERSION" | cut -d. -f2 | grep -E '^[0-9]+$' || echo "1")
          PATCH=$(echo "$VERSION" | cut -d. -f3 | grep -E '^[0-9]+$' || echo "0")

          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-1}
          PATCH=${PATCH:-0}

          echo "Parsed: MAJOR=$MAJOR, MINOR=$MINOR, PATCH=$PATCH"

          NEW_PATCH=$((PATCH + 1))

          if [ "$MAJOR" -eq 0 ] && [ "$MINOR" -lt 2 ]; then
            echo "Current version ($MAJOR.$MINOR.$PATCH) is older than 0.2.0. Bumping to v0.2.0"
            NEW_VERSION="v0.2.0"
            VERSION_NUMBER="0.2.0"
          else
            NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
            VERSION_NUMBER="${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi

          echo "New version: $NEW_VERSION"
          echo "Version number: $VERSION_NUMBER"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_number=$VERSION_NUMBER" >> $GITHUB_OUTPUT

      - name: Get commits since last release
        id: get_commits
        run: |
          LATEST_TAG="${{ steps.get_version.outputs.latest_tag }}"
          FORMAT="- %s (%h)%n%w(0,2,2)%b"
          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            git log "$LATEST_TAG"..HEAD --pretty=format:"$FORMAT" --no-merges | head -150 > commits.txt
          else
            git log --pretty=format:"$FORMAT" --no-merges | head -150 > commits.txt
          fi
          sed -i 's/^[[:space:]]*$//g' commits.txt
          cat -s commits.txt > commits_clean.txt && mv commits_clean.txt commits.txt
          echo "" >> commits.txt

          echo "commits<<COMMITS_HEREDOC_END" >> $GITHUB_OUTPUT
          cat commits.txt >> $GITHUB_OUTPUT
          echo "COMMITS_HEREDOC_END" >> $GITHUB_OUTPUT

      - name: Generate AI release notes
        id: generate_notes
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          COMMITS: ${{ steps.get_commits.outputs.commits }}
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          PROMPT="You are a release notes generator for OpenNOW, an open source native GeForce NOW client built with Rust. Generate clean, user-friendly release notes from these git commits. Categorize them into sections: Added (new features), Changed (updates/improvements), Fixed (bug fixes), and Removed (if any). Keep descriptions concise and user-focused. If a commit doesn't fit these categories, skip it. Only include sections that have items. Format in markdown. Do not include any introduction or conclusion text, just the categorized list."
          PROMPT=$(printf "%s\n\nGit commits:\n%s" "$PROMPT" "$COMMITS")

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{
              "model": "google/gemini-3-flash-preview",
              "messages": [{"role": "user", "content": $prompt}],
              "max_tokens": 1000
            }')

          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "HTTP-Referer: https://github.com/Dinoway/OpenNOW-Android" \
            -H "X-Title: OpenNOW Android Release Notes" \
            -d "$PAYLOAD")

          NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$NOTES" ]; then
            NOTES=$(printf "### Changes\n\n%s" "$COMMITS")
          fi

          echo "$NOTES" > release_notes.md
          echo "" >> release_notes.md

          echo "release_notes<<NOTES_HEREDOC_END" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "NOTES_HEREDOC_END" >> $GITHUB_OUTPUT

  # Android build job (temporarily the only build)
  build-android:
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android-arm64
            arch: aarch64
            rust_target: aarch64-linux-android
          - target: android-arm32
            arch: armv7
            rust_target: armv7-linux-androideabi

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update version in Cargo.toml
        shell: bash
        run: |
          VERSION="${{ needs.get-version.outputs.version_number }}"
          echo "Setting version to: $VERSION"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format '$VERSION', using fallback 0.1.0"
            VERSION="0.1.0"
          fi

          sed -i "1,10s/^version = \"[^\"]*\"/version = \"$VERSION\"/" opennow-streamer/Cargo.toml
          echo "=== Verifying version ==="
          echo "opennow-streamer/Cargo.toml: $(grep '^version' opennow-streamer/Cargo.toml | head -1)"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install Android NDK and Build Tools
        run: |
          echo "Installing Android SDK components..."
          
          # Accept licenses
          yes | sdkmanager --licenses || true
          
          # Install required components
          sdkmanager --install \
            "ndk;26.1.10909125" \
            "platforms;android-29" \
            "build-tools;34.0.0" \
            "platform-tools"
          
          echo "=== Installed NDK versions ==="
          ls -la $ANDROID_HOME/ndk/ || echo "No NDK directory"
          
          echo "=== Verifying NDK 26.1.10909125 ==="
          if [ -d "$ANDROID_HOME/ndk/26.1.10909125" ]; then
            echo "✓ NDK 26.1.10909125 installed successfully"
            ls -la "$ANDROID_HOME/ndk/26.1.10909125/"
          else
            echo "✗ NDK 26.1.10909125 not found"
            exit 1
          fi

      - name: Setup Android environment variables
        run: |
          # Set Android environment variables
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          
          # Add toolchain to PATH
          echo "$ANDROID_HOME/ndk/26.1.10909125/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
          
          # Verify paths
          echo "=== Environment Variables Set ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_NDK_HOME: $ANDROID_HOME/ndk/26.1.10909125"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "opennow-streamer -> target"
          key: ${{ matrix.target }}

      - name: Install Android dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            clang \
            libclang-dev \
            libc6-dev

      - name: Build for Android
        working-directory: opennow-streamer
        env:
          CC_aarch64_linux_android: aarch64-linux-android29-clang
          CXX_aarch64_linux_android: aarch64-linux-android29-clang++
          AR_aarch64_linux_android: llvm-ar
          CC_armv7_linux_androideabi: armv7a-linux-androideabi29-clang
          CXX_armv7_linux_androideabi: armv7a-linux-androideabi29-clang++
          AR_armv7_linux_androideabi: llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: aarch64-linux-android29-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: armv7a-linux-androideabi29-clang
        run: |
          echo "Building OpenNOW for Android (${{ matrix.arch }})..."
          cargo ndk \
            --target ${{ matrix.rust_target }} \
            --platform ${{ env.ANDROID_API_LEVEL }} \
            build --release --verbose

      - name: Create Android project structure
        run: |
          mkdir -p android-project/app/src/main/jniLibs/${{ matrix.arch }}
          mkdir -p android-project/app/src/main/res/values
          mkdir -p android-project/app/src/main/res/drawable
          mkdir -p android-project/app/src/main/res/mipmap-hdpi
          mkdir -p android-project/app/src/main/res/mipmap-mdpi
          mkdir -p android-project/app/src/main/res/mipmap-xhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxxhdpi

      - name: Copy native library
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            ARCH_DIR="arm64-v8a"
          else
            ARCH_DIR="armeabi-v7a"
          fi
          
          cp opennow-streamer/target/${{ matrix.rust_target }}/release/libopennow_streamer.so \
             android-project/app/src/main/jniLibs/$ARCH_DIR/

      - name: Create AndroidManifest.xml
        run: |
          cat > android-project/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.opennow.streamer">

              <!-- Network permissions for WebRTC streaming -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
          
              <!-- Keep screen on during streaming -->
              <uses-permission android:name="android.permission.WAKE_LOCK" />
          
              <!-- Android TV support -->
              <uses-feature android:name="android.software.leanback" android:required="false" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:name="android.hardware.gamepad" android:required="false" />

              <application
                  android:label="OpenNOW"
                  android:icon="@mipmap/ic_launcher"
                  android:allowBackup="true"
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen"
                  android:hardwareAccelerated="true"
                  android:banner="@drawable/tv_banner">

                  <!-- Main activity using NativeActivity for Rust -->
                  <activity
                      android:name="android.app.NativeActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:launchMode="singleTask"
                      android:screenOrientation="sensorLandscape">
          
                      <!-- Native library name (without lib prefix and .so suffix) -->
                      <meta-data
                          android:name="android.app.lib_name"
                          android:value="opennow_streamer" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                          <!-- Android TV launcher -->
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create build.gradle
        run: |
          cat > android-project/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.opennow.streamer'
              compileSdk 34

              defaultConfig {
                  applicationId "com.opennow.streamer"
                  minSdk 29
                  targetSdk 34
                  versionCode 1
                  versionName "${{ needs.get-version.outputs.version_number }}"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              packagingOptions {
                  jniLibs {
                      useLegacyPackaging = true
                  }
              }
          }
          EOF

      - name: Create project-level build.gradle
        run: |
          cat > android-project/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.4'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Create settings.gradle
        run: |
          cat > android-project/settings.gradle << 'EOF'
          rootProject.name = "OpenNOW"
          include ':app'
          EOF

      - name: Create gradle.properties
        run: |
          cat > android-project/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Create placeholder resources
        run: |
          # Create a basic launcher icon (placeholder)
          echo '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#26A69A" android:pathData="M0,0h108v108h-108z"/><path android:fillColor="#00695C" android:pathData="M27,27h54v54h-54z"/></vector>' > android-project/app/src/main/res/drawable/tv_banner.xml
          
          # Copy to all mipmap folders
          for dir in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            cp android-project/app/src/main/res/drawable/tv_banner.xml \
               android-project/app/src/main/res/mipmap-$dir/ic_launcher.xml
          done
          
          # Create strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">OpenNOW</string></resources>' > android-project/app/src/main/res/values/strings.xml

      - name: Build APK with Gradle
        working-directory: android-project
        run: |
          chmod +x gradlew || true
          ./gradlew assembleRelease --stacktrace || \
          (cd .. && gradle -p android-project assembleRelease --stacktrace)

      - name: Sign APK (debug signature)
        run: |
          # Use debug keystore for now (replace with release keystore later)
          APK_PATH="android-project/app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_APK="OpenNOW-${{ matrix.target }}.apk"
          
          if [ -f "$APK_PATH" ]; then
            # Create debug keystore if it doesn't exist
            if [ ! -f "$HOME/.android/debug.keystore" ]; then
              mkdir -p "$HOME/.android"
              keytool -genkey -v -keystore "$HOME/.android/debug.keystore" \
                -storepass android -alias androiddebugkey -keypass android \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -dname "CN=Android Debug,O=Android,C=US"
            fi
          
            # Sign the APK
            $ANDROID_HOME/build-tools/${{ env.ANDROID_BUILD_TOOLS }}/zipalign -v -p 4 \
              "$APK_PATH" aligned.apk
          
            $ANDROID_HOME/build-tools/${{ env.ANDROID_BUILD_TOOLS }}/apksigner sign \
              --ks "$HOME/.android/debug.keystore" \
              --ks-key-alias androiddebugkey \
              --ks-pass pass:android \
              --key-pass pass:android \
              --out "$SIGNED_APK" \
              aligned.apk
          
            echo "APK signed: $SIGNED_APK"
          else
            echo "ERROR: APK not found at $APK_PATH"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: opennow-android-${{ matrix.target }}-${{ needs.get-version.outputs.version }}
          path: OpenNOW-${{ matrix.target }}.apk
          retention-days: 30

      - name: Upload APK to release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.get-version.outputs.version }}
          name: "OpenNOW Android ${{ needs.get-version.outputs.version }}"
          body: |
            ## OpenNOW Android ${{ needs.get-version.outputs.version }}
            
            **⚠️ ALPHA BUILD - Android Port in Development**
            
            ${{ needs.get-version.outputs.release_notes }}
            
            ### Android Installation
            1. Enable "Install from Unknown Sources" in Android settings
            2. Download and install APK
            3. For Android TV: Use sideloading tools or ADB
            
            **Supported Devices:**
            - Android TV (API 29+)
            - Android Mobile/Tablets (API 29+)
            - ARM64 (arm64-v8a) and ARMv7 (armeabi-v7a)
            
            **Known Issues:**
            - Video decoding pipeline in development
            - Audio playback not yet implemented
            - Controller input limited
          draft: false
          prerelease: true
          files: OpenNOW-${{ matrix.target }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
